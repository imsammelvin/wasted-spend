version: 1.2.1
cache: true

# RCA agent tools — the unified ClickHouse as an MCP tool (agent/server.ts)
# rca-tools is a docker-internal hostname → private IP, so it must be
# explicitly allowlisted past LibreChat's SSRF protection
mcpSettings:
  allowedDomains:
    - 'http://rca-tools:8100'
mcpServers:
  wasted-spend:
    type: streamable-http
    url: http://rca-tools:8100/mcp
    timeout: 30000

endpoints:
  custom:
    - name: 'LiteLLM'
      apiKey: '${LITELLM_MASTER_KEY}'
      baseURL: 'http://toxiproxy:24000/v1' # → litellm, via the chaos switchboard
      models:
        # mock-pro: unlimited/$0 (canned reply) — the fallback when free tiers 429
        default: ['mock-pro', 'llama-3.1-8b', 'llama-3.3-70b', 'gemini-flash']
        fetch: false
      titleConvo: true
      titleModel: 'llama-3.1-8b' # titles must not burn the 70b's small daily quota
      modelDisplayLabel: 'LiteLLM'
