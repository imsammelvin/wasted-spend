version: 1.2.1
cache: true

# RCA agent tools — the unified ClickHouse as an MCP tool (agent/server.ts)
# rca-tools is a docker-internal hostname → private IP, so it must be
# explicitly allowlisted past LibreChat's SSRF protection
mcpSettings:
  allowedDomains:
    - 'http://rca-tools:8100'
mcpServers:
  wasted-spend:
    type: streamable-http
    url: http://rca-tools:8100/mcp
    timeout: 30000

endpoints:
  custom:
    - name: 'LiteLLM'
      apiKey: '${LITELLM_MASTER_KEY}'
      baseURL: 'http://litellm:4000/v1'
      models:
        default: ['llama-3.3-70b', 'gemini-flash', 'mock-pro']
        fetch: true
      titleConvo: true
      titleModel: 'llama-3.3-70b'
      modelDisplayLabel: 'LiteLLM'
