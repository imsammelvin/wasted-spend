model_list:
  # Free-tier providers — GROQ_API_KEY / GEMINI_API_KEY in .env, no card needed.
  - model_name: llama-3.3-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # separate (larger) free-tier daily quota than the 70b — use for titles & light chat
  - model_name: llama-3.1-8b
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # RAG embeddings (LibreChat rag_api → LiteLLM → Gemini)
  - model_name: embeddings
    litellm_params:
      model: gemini/text-embedding-004
      api_key: os.environ/GEMINI_API_KEY

  # Zero-cost pipeline testing: real request/response flow, canned completion.
  # Priced as gemini-2.5-pro (Langfuse prices by model name; the call itself is
  # mocked → actual spend $0) and long enough (~350 tokens) to look like a real
  # answer — demo economics without demo bills.
  - model_name: mock-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: mock-key
      mock_response: 'Based on the documents you provided, here is a detailed breakdown of the situation. The primary driver of the behavior you are describing is the interaction between the retrieval layer and the generation step: when the vector search returns a large candidate set, the reranker expands the context window substantially, which increases both latency and token consumption downstream. In practical terms, this means that every additional retrieved chunk adds roughly two hundred to four hundred tokens of prompt context, and the model must attend over all of it before producing the first output token. There are three concrete steps you can take to improve this. First, tighten the retrieval top-k parameter and apply a similarity threshold so that marginal, low-relevance chunks never reach the prompt at all; most workloads see no quality loss with a top-k of five and a cosine threshold around 0.75. Second, enable response streaming so perceived latency drops even when total generation time is unchanged; users judge responsiveness by time-to-first-token far more than by total completion time. Third, consider caching embeddings for frequently asked queries, since repeated retrieval of identical content is pure waste both in compute and in dollars. If you implement all three, a typical deployment sees prompt sizes drop by forty to sixty percent, p95 latency improve by a factor of two, and cost per request fall proportionally. Let me know if you would like a worked example for any of these steps, including the specific configuration parameters and a before-and-after comparison of token counts, latency percentiles, and per-request cost so you can validate the improvement against your own traffic.'

litellm_settings:
  success_callback: ['langfuse']
  failure_callback: ['langfuse']
  callbacks: custom_callbacks.proxy_handler_instance # THE STITCH (litellm/custom_callbacks.py)
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
